name: 每日世界杯预测报告（中文）

# 触发条件：仅手动（定时已于 2026-07-19 决赛日后关闭，赛事结束不再每日推送）
on:
  # schedule 已停用 —— 原北京时间 12:00/12:13/12:27/12:43 兜底触发
  workflow_dispatch:
    inputs:
      sim_runs:
        description: '蒙特卡洛模拟次数（默认 3000）'
        required: false
        default: '3000'

# 提交报告需要写权限；并发控制避免重复跑
permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 今天是否已推送过（仅定时去重；手动触发强制运行）
        id: today
        run: |
          today=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "date=$today" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发 → 强制运行。"
            echo "already=false" >> "$GITHUB_OUTPUT"
          elif [ -f "reports/archive/报告_${today}.md" ]; then
            echo "今天定时已成功推送过（归档已存在）→ 跳过，避免重复发微信。"
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "今天尚未推送 → 正常运行。"
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 安装 Python
        if: steps.today.outputs.already != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        if: steps.today.outputs.already != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成中文预测报告
        if: steps.today.outputs.already != 'true'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SIM_RUNS: ${{ github.event.inputs.sim_runs || '10000' }}
          TOP_N: '20'
          DAYS_AHEAD: '1'
          MAX_PREDICT: '8'
          MPLBACKEND: Agg
        run: python report_zh.py

      - name: 写入本次运行的摘要（Actions 页面可直接看）
        if: steps.today.outputs.already != 'true'
        run: |
          {
            echo "# 📄 本次预测报告"
            echo ""
            cat reports/预测报告.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 提交报告回仓库
        if: steps.today.outputs.already != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/预测报告.md reports/archive/
          if git diff --cached --quiet; then
            echo "报告无变化，跳过提交。"
          else
            git commit -m "🤖 自动更新每日预测报告 $(date -u +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main
            git push
          fi
